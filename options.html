<!DOCTYPE html>
<html>
<head>
  <title>AI Helper Options</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
      max-width: 500px;
      margin: 0 auto;
      background: #f5f5f5;
    }
    h1 {
      color: #333;
      font-size: 24px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #555;
    }
    input, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
    }
    select {
      background: white;
    }
    button {
      background: #1a1a2e;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #16213e;
    }
    .status {
      margin-top: 10px;
      padding: 10px;
      border-radius: 6px;
      display: none;
    }
    .status.success {
      display: block;
      background: #d4edda;
      color: #155724;
    }
    .status.error {
      display: block;
      background: #f8d7da;
      color: #721c24;
    }
    .hint {
      font-size: 12px;
      color: #888;
      margin-top: 5px;
    }
    .custom-fields {
      display: none;
      margin-top: 15px;
      padding: 15px;
      background: #fff;
      border-radius: 6px;
      border: 1px solid #ddd;
    }
    .custom-fields.visible {
      display: block;
    }
  </style>
</head>
<body>
  <h1>AI Helper Settings</h1>

  <div class="form-group">
    <label for="provider">Provider</label>
    <select id="provider">
      <option value="gemini">Google Gemini (3 Flash)</option>
      <option value="groq">Groq (Kimi-K2, Llama, etc.)</option>
      <option value="openai">OpenAI (GPT-4o, etc.)</option>
      <option value="custom">Custom endpoint</option>
    </select>
  </div>

  <div class="form-group">
    <label for="model">Model</label>
    <select id="model"></select>
    <p class="hint" id="modelHint"></p>
  </div>

  <div class="form-group">
    <label for="apiKey">API Key</label>
    <input type="password" id="apiKey" placeholder="Enter your API key">
    <p class="hint" id="apiKeyHint"></p>
  </div>

  <div id="customFields" class="custom-fields">
    <div class="form-group">
      <label for="customEndpoint">API Endpoint</label>
      <input type="text" id="customEndpoint" placeholder="https://api.example.com/v1/chat/completions">
    </div>
    <div class="form-group">
      <label for="customModel">Model Name</label>
      <input type="text" id="customModel" placeholder="model-name">
    </div>
  </div>

  <button id="save">Save</button>
  <div id="status" class="status"></div>
  <script src="options.js"></script>
</body>
</html>
